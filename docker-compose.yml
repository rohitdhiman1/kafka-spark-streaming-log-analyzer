services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - log-analyzer-net

  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - log-analyzer-net

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.1
    container_name: kafdrop
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: broker:29092
      JVM_OPTS: "-Xms64M -Xmx128M"
    networks:
      - log-analyzer-net

  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT_NUMBER: 7077
      SPARK_MASTER_WEBUI_PORT_NUMBER: 8080
    ports:
      - "8080:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[M]aster'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - log-analyzer-net

  spark-worker:
    image: bitnamilegacy/spark:3.5
    container_name: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_WEBUI_PORT_NUMBER: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[W]orker'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - log-analyzer-net

  producer:
    build:
      context: ./producer
    container_name: log-producer
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_TOPIC: web-logs
    networks:
      - log-analyzer-net

  spark-job:
    build:
      context: ./spark-job
    container_name: spark-job
    depends_on:
      broker:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
      producer:
        condition: service_started
    command:
      - /opt/bitnami/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      - /opt/app/log_analyzer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_TOPIC: web-logs
    networks:
      - log-analyzer-net

networks:
  log-analyzer-net:
    driver: bridge
